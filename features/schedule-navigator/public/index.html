<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARDD Navigator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      background: #1a1d27;
      border: 1px solid #2e3148;
      border-radius: 16px;
      padding: 40px;
      max-width: 620px;
      width: 100%;
    }
    h1 {
      font-size: 1.8rem;
      color: #7c83f5;
      margin-bottom: 6px;
    }
    p.subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #2e3148;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.9rem;
      color: #ccc;
      background: #0f1117;
      border: 1px solid #2e3148;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #7c83f5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #6470f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ARDD Navigator</h1>
    <p class="subtitle">Tell us about yourself to get your personalized conference schedule.</p>

    <label>Full Name</label>
    <input type="text" id="name" placeholder="e.g. Jane Smith" />

    <label>Affiliation</label>
    <input type="text" id="affiliation" placeholder="e.g. Harvard Medical School" />

    <label>Role</label>
    <select id="role">
      <option value="">Select your role</option>
      <option value="academic">Academic Researcher</option>
      <option value="founder">Startup Founder</option>
      <option value="investor">Investor</option>
      <option value="pharma">Pharma / Biotech</option>
      <option value="bd">Business Development</option>
    </select>

    <label>Primary Goal at ARDD</label>
    <select id="goal">
      <option value="">Select your goal</option>
      <option value="fundraising">Fundraising</option>
      <option value="recruiting">Recruiting</option>
      <option value="collaboration">Research Collaboration</option>
      <option value="publishing">Publishing / Academic</option>
      <option value="bd">Business Development</option>
    </select>

    <label>Research / Business Focus</label>
    <textarea id="focus" rows="3" placeholder="e.g. senolytic therapies, NAD+ metabolism, longevity diagnostics..."></textarea>

    <label>Interests (select all that apply)</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="senolytics"> Senolytics</label>
      <label><input type="checkbox" value="epigenetics"> Epigenetics</label>
      <label><input type="checkbox" value="NAD"> NAD+ / Metabolism</label>
      <label><input type="checkbox" value="AI"> AI & Longevity</label>
      <label><input type="checkbox" value="diagnostics"> Diagnostics</label>
      <label><input type="checkbox" value="clinical"> Clinical Trials</label>
      <label><input type="checkbox" value="investment"> Investment / Deals</label>
      <label><input type="checkbox" value="geroprotectors"> Geroprotectors</label>
    </div>

    <button onclick="submitProfile()">Build My Schedule →</button>
  </div>

  <script>
    function submitProfile() {
      const interests = [...document.querySelectorAll('.checkbox-group input:checked')]
        .map(el => el.value);

      const profile = {
        name: document.getElementById('name').value,
        affiliation: document.getElementById('affiliation').value,
        role: document.getElementById('role').value,
        goal: document.getElementById('goal').value,
        focus: document.getElementById('focus').value,
        interests
      };

      if (!profile.name || !profile.role || !profile.goal) {
        alert('Please fill in your name, role, and goal.');
        return;
      }

      fetch('/api/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(profile)
      })
      .then(res => res.json())
      .then(data => {
        localStorage.setItem('schedule', JSON.stringify(data));
        localStorage.setItem('profile', JSON.stringify(profile));
        window.location.href = '/schedule.html';
      });
    }
  </script>
</body>
</html>
