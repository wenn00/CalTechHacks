<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARDD Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 14px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2e3148;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    h1 { font-size: 1.3rem; color: #7c83f5; }
    .subtitle { color: #888; font-size: 0.82rem; }
    .tab-bar { display: flex; gap: 8px; margin-left: auto; }
    .tab-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #2e3148;
      background: #0f1117;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .tab-btn.active { background: #7c83f5; color: white; border-color: #7c83f5; }
    .back-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #7c83f5;
      background: transparent;
      color: #7c83f5;
      font-size: 0.85rem;
      text-decoration: none;
    }
    #world-view { flex: 1; display: flex; flex-direction: column; }
    .map-toolbar {
      padding: 10px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2e3148;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .map-toolbar span { color: #888; font-size: 0.8rem; margin-right: 4px; }
    .pill-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #2e3148;
      background: #0f1117;
      color: #ccc;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .pill-btn.active { background: #7c83f5; color: white; border-color: #7c83f5; }
    #map { flex: 1; }
    .map-legend {
      position: absolute;
      bottom: 24px;
      right: 12px;
      z-index: 1000;
      background: #1a1d27ee;
      border: 1px solid #2e3148;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.78rem;
      color: #ccc;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .ldot { width: 11px; height: 11px; border-radius: 50%; }
    #floor-view { flex: 1; display: none; flex-direction: row; }
    .fp-sidebar {
      width: 220px;
      background: #1a1d27;
      border-right: 1px solid #2e3148;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }
    .fp-sidebar h2 { font-size: 0.95rem; color: #7c83f5; margin-bottom: 12px; }
    .floor-switch { display: flex; gap: 6px; margin-bottom: 16px; }
    .floor-switch button {
      flex: 1;
      padding: 7px;
      border-radius: 7px;
      border: 1px solid #2e3148;
      background: #0f1117;
      color: #ccc;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .floor-switch button.active { background: #7c83f5; color: white; border-color: #7c83f5; }
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
      margin-top: 12px;
      margin-bottom: 6px;
    }
    .cb-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
    .cb-item input { accent-color: #7c83f5; cursor: pointer; }
    .cb-item label { font-size: 0.83rem; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .cdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .fp-main {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fp-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #fp-markers {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .fp-pin {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: all;
      cursor: pointer;
    }
    .fp-pin .pin-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
      transition: transform 0.15s;
    }
    .fp-pin:hover .pin-dot { transform: scale(1.4); }
    .fp-pin .pin-tip {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1d27;
      border: 1px solid #2e3148;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.7rem;
      white-space: nowrap;
      color: #f0f0f0;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .fp-pin:hover .pin-tip { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🌍 ARDD Map</h1>
    <p class="subtitle">Attendee origins & venue floor plan</p>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-world" onclick="showTab('world')">🌍 World Map</button>
    <button class="tab-btn" id="tab-floor" onclick="showTab('floor')">🏛 Floor Plan</button>
  </div>
  <a href="/" class="back-btn">← Home</a>
</div>

<!-- WORLD MAP -->
<div id="world-view">
  <div class="map-toolbar">
    <span>Jump to:</span>
    <button class="pill-btn" onclick="map.setView([30,10],2)">🌍 World</button>
    <button class="pill-btn" onclick="map.setView([42.3744,-71.1169],17)">📍 Harvard Venue</button>
    <span style="margin-left:12px">Show:</span>
    <button class="pill-btn active" id="pill-attendees" onclick="toggleLayer('attendees')">👥 Attendees</button>
  </div>
  <div id="map"></div>
  <div class="map-legend">
    <div class="legend-row"><div class="ldot" style="background:#7c83f5"></div> Attendee origin</div>
    <div class="legend-row"><div class="ldot" style="background:#f59e0b"></div> Conference venue</div>
  </div>
</div>

<!-- FLOOR PLAN -->
<div id="floor-view">
  <div class="fp-sidebar">
    <h2>📐 Venue Rooms</h2>
    <div class="floor-switch">
      <button class="active" id="f2btn" onclick="switchFloor(2)">Floor 2</button>
      <button id="f3btn" onclick="switchFloor(3)">Floor 3</button>
    </div>
    <div class="section-label">Session Rooms</div>
    <div class="cb-item"><input type="checkbox" id="cb-sessions" checked onchange="togglePins('sessions')"><label for="cb-sessions"><span class="cdot" style="background:#7c83f5"></span> Session Rooms</label></div>
    <div class="section-label">Food & Drinks</div>
    <div class="cb-item"><input type="checkbox" id="cb-food" checked onchange="togglePins('food')"><label for="cb-food"><span class="cdot" style="background:#f97316"></span> Food & Coffee</label></div>
    <div class="section-label">Facilities</div>
    <div class="cb-item"><input type="checkbox" id="cb-restrooms" checked onchange="togglePins('restrooms')"><label for="cb-restrooms"><span class="cdot" style="background:#10b981"></span> Restrooms</label></div>
    <div class="cb-item"><input type="checkbox" id="cb-elevators" checked onchange="togglePins('elevators')"><label for="cb-elevators"><span class="cdot" style="background:#f59e0b"></span> Elevators</label></div>
    <div class="cb-item"><input type="checkbox" id="cb-nursing" checked onchange="togglePins('nursing')"><label for="cb-nursing"><span class="cdot" style="background:#ec4899"></span> Nursing Room</label></div>
  </div>
  <div class="fp-main">
    <img id="fp-img" src="/floorplan2.png" alt="Floor Plan" onload="renderPins()"/>
    <div id="fp-markers"></div>
  </div>
</div>

<script>
function showTab(tab) {
  document.getElementById('world-view').style.display = tab === 'world' ? 'flex' : 'none';
  document.getElementById('floor-view').style.display = tab === 'floor' ? 'flex' : 'none';
  document.getElementById('tab-world').classList.toggle('active', tab === 'world');
  document.getElementById('tab-floor').classList.toggle('active', tab === 'floor');
  if (tab === 'world') map.invalidateSize();
  if (tab === 'floor') renderPins();
}

// ── WORLD MAP ──
const map = L.map('map').setView([30, 10], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

function coloredIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${color};border-radius:50%;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,0.4);"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
}

const venueLayer = L.layerGroup();
L.marker([42.3744, -71.1169], { icon: coloredIcon('#f59e0b') })
  .bindPopup('<b>David Rubenstein Treehouse</b><br>Harvard University<br><em>ARDD 2026 Venue</em>')
  .addTo(venueLayer);

const attendeesLayer = L.layerGroup();
fetch('/api/attendees')
  .then(r => r.json())
  .then(data => {
    const list = data.length > 0 ? data : [
      { name: 'Dr. Elena Vasquez', institution: 'Harvard Medical School', role: 'Academic', lat: 42.3770, lng: -71.1167 },
      { name: 'Marcus Chen', institution: 'Chronomics Diagnostics', role: 'Founder', lat: 37.7749, lng: -122.4194 },
      { name: 'Sophia Hartmann', institution: 'Perenni Capital', role: 'Investor', lat: 51.5074, lng: -0.1278 },
      { name: 'Dr. James Okafor', institution: 'Calico', role: 'Researcher', lat: 37.4419, lng: -122.1430 },
      { name: 'Yuki Tanaka', institution: 'AgeMed Pharma', role: 'Pharma BD', lat: 35.6762, lng: 139.6503 },
      { name: 'Lena Bauer', institution: 'Heidelberg University', role: 'Academic', lat: 49.3988, lng: 8.6724 },
      { name: 'Carlos Rivera', institution: 'LongeVC', role: 'Investor', lat: 40.4168, lng: -3.7038 },
    ];
    list.forEach(a => {
      if (a.lat && a.lng)
        L.marker([a.lat, a.lng], { icon: coloredIcon('#7c83f5') })
          .bindPopup(`<b>${a.name}</b><br>${a.institution||''}<br><em>${a.role||''}</em>`)
          .addTo(attendeesLayer);
    });
  }).catch(()=>{});

venueLayer.addTo(map);
attendeesLayer.addTo(map);

const wLayers = { attendees: attendeesLayer };
const wActive = { attendees: true };
function toggleLayer(name) {
  wActive[name] = !wActive[name];
  const btn = document.getElementById('pill-' + name);
  if (wActive[name]) { map.addLayer(wLayers[name]); btn.classList.add('active'); }
  else { map.removeLayer(wLayers[name]); btn.classList.remove('active'); }
}

// ── FLOOR PLAN ──
// Positions based on PDF floor plan
// Floor 2: Lane's Edge (top-left), Riverbend (top-center), The Nest (top-right)
//          West Hollow (mid-left), Cedar Grove (bottom-right), Branch View (bottom-left)
//          Nursing Room is labeled between West Hollow and Branch View on left side
//          Restrooms: one near Riverbend top-right area, two on left side near Branch View
//          Elevators: one near The Nest right side, two in center stairwell area

let currentFloor = 2;
const pinVisibility = { sessions: true, food: true, restrooms: true, elevators: true, nursing: true };

const floorData = {
  2: {
    sessions: [
      { label: "Lane's Edge 205 — Workshops", x: 22, y: 24 },
      { label: 'Riverbend 201 — Main Sessions', x: 55, y: 22 },
      { label: 'The Nest 204', x: 78, y: 20 },
      { label: 'West Hollow 209 — Breakouts', x: 22, y: 44 },
      { label: 'Cedar Grove 220 — Panels', x: 78, y: 66 },
      { label: 'Branch View 221 — Networking', x: 18, y: 76 },
    ],
    food: [
      { label: '☕ Coffee Station', x: 44, y: 50 },
      { label: '🍱 Lunch Area', x: 50, y: 57 },
      { label: '🥐 Snack Bar', x: 36, y: 46 },
    ],
    restrooms: [
      { label: '🚻 Restroom', x: 68, y: 30 },
      { label: '🚻 Restroom', x: 28, y: 69 },
      { label: '🚻 Restroom', x: 32, y: 76 },
    ],
    elevators: [
      { label: '🛗 Elevator', x: 76, y: 38 },
      { label: '🛗 Elevator', x: 50, y: 69 },
      { label: '🛗 Elevator', x: 57, y: 74 },
    ],
    nursing: [
      { label: '🤱 Nursing Room', x: 26, y: 60 },
    ],
  },
  3: {
    sessions: [
      { label: 'Canopy A — Keynotes', x: 28, y: 30 },
      { label: 'Canopy B — Main Stage', x: 60, y: 30 },
      { label: 'East Branch — Investor Panels', x: 78, y: 64 },
      { label: 'West Branch — BD Sessions', x: 22, y: 74 },
      { label: 'Atrium — Networking', x: 38, y: 74 },
    ],
    food: [
      { label: '☕ Coffee Bar', x: 44, y: 54 },
      { label: '🍱 Reception Catering', x: 52, y: 64 },
      { label: '🥂 Evening Reception', x: 62, y: 48 },
    ],
    restrooms: [
      { label: '🚻 Restroom', x: 22, y: 58 },
      { label: '🚻 Restroom', x: 28, y: 65 },
    ],
    elevators: [
      { label: '🛗 Elevator', x: 74, y: 36 },
      { label: '🛗 Elevator', x: 52, y: 64 },
      { label: '🛗 Elevator', x: 58, y: 70 },
    ],
    nursing: [],
  }
};

const pinColors = {
  sessions: '#7c83f5',
  food: '#f97316',
  restrooms: '#10b981',
  elevators: '#f59e0b',
  nursing: '#ec4899'
};

function renderPins() {
  const img = document.getElementById('fp-img');
  const container = document.getElementById('fp-markers');
  container.innerHTML = '';
  const rect = img.getBoundingClientRect();
  const parent = img.parentElement.getBoundingClientRect();
  const offX = rect.left - parent.left;
  const offY = rect.top - parent.top;
  const data = floorData[currentFloor];
  Object.entries(data).forEach(([type, pins]) => {
    if (!pinVisibility[type]) return;
    pins.forEach(pin => {
      const el = document.createElement('div');
      el.className = 'fp-pin';
      el.style.left = (offX + (pin.x / 100) * rect.width) + 'px';
      el.style.top = (offY + (pin.y / 100) * rect.height) + 'px';
      el.innerHTML = `
        <div class="pin-dot" style="background:${pinColors[type]}"></div>
        <div class="pin-tip">${pin.label}</div>
      `;
      container.appendChild(el);
    });
  });
}

function togglePins(type) {
  pinVisibility[type] = !pinVisibility[type];
  renderPins();
}

function switchFloor(floor) {
  currentFloor = floor;
  document.getElementById('f2btn').classList.toggle('active', floor === 2);
  document.getElementById('f3btn').classList.toggle('active', floor === 3);
  const img = document.getElementById('fp-img');
  img.src = floor === 2 ? '/floorplan2.png' : '/floorplan3.png';
  img.onload = renderPins;
  renderPins();
}

window.addEventListener('resize', renderPins);
</script>
</body>
</html>
